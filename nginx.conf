server {
    listen 80;
    listen [::]:80;
    server_name jaruldomnesc.it www.jaruldomnesc.it;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jaruldomnesc.it www.jaruldomnesc.it;

    # SSL — Let's Encrypt (certbot aggiorna questi path automaticamente)
    ssl_certificate     /etc/letsencrypt/live/jaruldomnesc.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaruldomnesc.it/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Root del sito
    root  /var/www/jaruldomnesc;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────
    # Impedisce clickjacking: il sito non può essere caricato in iframe esterni
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Impedisce al browser di eseguire file con MIME type sbagliato
    add_header X-Content-Type-Options "nosniff" always;

    # Controlla quante info vengono passate ai siti esterni nei referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disabilita API browser non utilizzate dal sito
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy — whitelist esplicita delle sorgenti consentite
    # - default-src 'self'      → tutto deve venire dal nostro dominio salvo eccezioni
    # - script-src 'self'       → nessun JS da CDN esterni (il sito non ne usa)
    # - style-src ... fonts.googleapis.com → Google Fonts CSS
    # - font-src  ... fonts.gstatic.com   → file font effettivi da Google
    # - frame-src ... google.com          → iframe Google Maps in contatti.html
    # - img-src   ... unsplash.com        → foto hero da Unsplash + immagini inline
    # - connect-src ... googleapis.com    → fetch() verso Google Apps Script (menu.html)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        frame-src   https://www.google.com;
        img-src     'self' data: https://images.unsplash.com;
        connect-src 'self' https://script.googleapis.com https://script.google.com;
    " always;

    # HSTS — forza HTTPS per 1 anno dopo il primo accesso
    # ATTENZIONE: attiva solo dopo aver verificato che SSL funzioni correttamente
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Pagina 404 personalizzata ────────────────────────────────────
    error_page 404 /404.html;

    # ── Routing ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Cache statica per asset immutabili ───────────────────────────
    location ~* \.(css|js|woff2|woff|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|webp|avif|gif|svg|ico)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # ── Blocca accesso a file sensibili ─────────────────────────────
    location ~ /\. {
        deny all;
    }
}
