<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pagina non trovata — Jarul Domnesc Official</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-color: var(--bg);
      padding: clamp(40px, 8vw, 100px) clamp(20px, 6vw, 60px);
    }
    .err-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 18vw, 180px);
      font-weight: 900;
      line-height: 1;
      color: var(--accent-light);
      letter-spacing: -4px;
      user-select: none;
    }
    .err-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 4vw, 40px);
      font-weight: 700;
      color: var(--black);
      margin: 16px 0 12px;
    }
    .err-sub {
      font-size: clamp(14px, 1.5vw, 16px);
      color: var(--gray);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 36px;
    }
    .err-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .err-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      margin: 20px auto 0;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="err-code" aria-hidden="true">404</div>
  <h1 class="err-title">Pagina non trovata</h1>
  <div class="err-divider" aria-hidden="true"></div>
  <p class="err-sub">
    La pagina che cerchi non esiste o è stata spostata.<br>
    Torna alla home o esplora il sito.
  </p>
  <div class="err-actions">
    <a href="index.html" class="btn-primary">Torna alla Home</a>
    <a href="menu.html" class="btn-ghost" style="color: var(--black); border-color: rgba(0,0,0,0.3);">Menu del Giorno</a>
  </div>

  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/cookie.js" defer></script>
</body>
</html>
